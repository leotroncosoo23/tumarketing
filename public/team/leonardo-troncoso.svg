<svg width="480" height="600" viewBox="0 0 480 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="initials" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="480" height="600" fill="url(#bg)" />
  <rect width="480" height="600" fill="url(#grid)" />
  <rect width="480" height="600" fill="url(#glow)" />

  <circle cx="240" cy="270" r="120" fill="none" stroke="rgba(34,211,238,0.25)" stroke-width="1.5" />
  <circle cx="240" cy="270" r="150" fill="none" stroke="rgba(34,211,238,0.12)" stroke-width="1" />

  <text x="240" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="800" fill="url(#initials)">LT</text>
</svg>
